simulation:
  start_month: "2026-06"
  default_sims: 100000
  random_seed: 42
  convergence_batches: 10

author_prior:
  agi_median_month: null
  asi_median_month: "2029-07"
  weight: 0.25
  note: "Explicit author-prior scenario centered on July 2029 for ASI. Kept separate from the empirical base forecast."

agi_stage:
  effective_compute_growth_x_per_year:
    distribution: triangular
    low: 2.5
    mode: 4.5
    high: 7.5
    unit: x/year
    evidence_category: intermediate

  algorithmic_efficiency_x_per_year:
    distribution: triangular
    low: 2.0
    mode: 5.0
    high: 12.0
    unit: x/year
    evidence_category: intermediate

  agent_time_horizon_doubling_months:
    distribution: triangular
    low: 3
    mode: 5
    high: 10
    unit: months
    evidence_category: intermediate

  current_agent_task_horizon_hours:
    distribution: triangular
    low: 8
    mode: 24
    high: 72
    unit: hours
    evidence_category: intermediate

  coding_automation_threshold_human_hours:
    distribution: triangular
    low: 120
    mode: 240
    high: 800
    unit: human-hours
    evidence_category: intermediate

  general_capability_lag_after_coding_months:
    distribution: triangular
    low: 0
    mode: 4
    high: 18
    unit: months
    evidence_category: agi

  agi_integration_lag_months:
    distribution: triangular
    low: 0
    mode: 3
    high: 12
    unit: months
    evidence_category: agi

asi_stage:
  ai_rnd_automation_lag_after_agi_months:
    distribution: triangular
    low: 1
    mode: 6
    high: 18
    unit: months
    evidence_category: intermediate

  superhuman_ai_researcher_lag_months:
    distribution: triangular
    low: 0
    mode: 6
    high: 30
    unit: months
    evidence_category: asi

  takeoff_lag_months:
    distribution: triangular
    low: 1
    mode: 9
    high: 36
    unit: months
    evidence_category: asi

  infrastructure_friction_months:
    distribution: triangular
    low: 0
    mode: 3
    high: 18
    unit: months
    evidence_category: intermediate

phase_overlap_coefficient:
  distribution: triangular
  low: 0.25
  mode: 0.45
  high: 0.65
  unit: fraction
  evidence_category: asi
  description: "Author-prior scenario leans toward faster takeoff, so the AGI-to-ASI overlap is higher than the empirical base."

long_tail_adjustment:
  enabled: true
  distribution_type: mixture
  base_model_weight: 0.85
  late_tail_weight: 0.15
  late_tail_distribution: shifted_lognormal
  late_tail_start_year: 2040
  description: "Fat-tail probability representing systemic bottlenecks, energy constraints, and alignment failures."

governance:
  compute_governance_friction_months:
    applies_to: internal_agi_and_internal_asi
    low: 0
    mode: 2
    high: 9
    unit: months
    evidence: "Tier 1 data centre permitting and domestic hardware friction."
  deployment_governance_delay_months:
    applies_to: public_asi_only
    low: 1
    mode: 4
    high: 18
    unit: months
    evidence: "Safety evaluations and audits prior to commercial release."
  secrecy_visibility_delay_months:
    applies_to: public_visibility_only
    low: 1
    mode: 4
    high: 12
    unit: months
    evidence: "Defense classification and national security restrictions."

correlation_matrix:
  effective_compute_growth_x_per_year:
    algorithmic_efficiency_x_per_year: 0.50
    agent_time_horizon_doubling_months: -0.60
  algorithmic_efficiency_x_per_year:
    agent_time_horizon_doubling_months: -0.55
